<th:block th:replace="~{layout/base :: layout(~{::title}, ~{::main})}">
    <title>Registro - GameVault</title>

    <main class="container">
        <div class="panel auth-panel">

            <h2 class="text-gradient">Crear Cuenta</h2>

            <form action="/registro" method="post">

                <div class="form-group">
                    <label for="nombre" class="form-label">Nombre</label>
                    <input type="text" id="nombre" name="nombre" required class="form-control">
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Correo electrónico</label>
                    <input type="email" id="email" name="email" required class="form-control">
                </div>

                <div class="form-group">
                    <label for="contrasenia" class="form-label">Contraseña</label>
                    <input type="password" id="contrasenia" name="contrasenia" required class="form-control">
                </div>

                <button type="submit" class="btn btn-primary full-btn">
                    Registrarme
                </button>
            </form>

            <p class="auth-link">
                ¿Ya tienes cuenta?
                <a href="/login">Inicia sesión</a>
            </p>
        </div>
    </main>
</th:block>
