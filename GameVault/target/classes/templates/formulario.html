<th:block th:replace="~{layout/base :: layout(~{::title}, ~{::main})}">
    <title>Formulario Juego - GameVault</title>

    <main class="container">
        <div class="panel" style="max-width: 650px; margin: 0 auto;">

            <h2 class="text-gradient" style="margin-top: 0;"
                th:text="${juego.id == null} ? 'Añadir Nuevo Juego' : 'Editar Juego'">
                Añadir Nuevo Juego
            </h2>

            <p style="color: var(--text-muted); margin-bottom: 30px;">
                Completa la información del videojuego.
            </p>

            <form th:action="${juego.id == null} ? @{/juegos} : @{/juegos/actualizar/{id}(id=${juego.id})}"
                  method="post"
                  enctype="multipart/form-data">

                <div class="form-group">
                    <label for="titulo" class="form-label">Título del Juego</label>
                    <input type="text" id="titulo" name="titulo" required class="form-control"
                           th:value="${juego.titulo}">
                </div>

                <div class="form-group">
                    <label for="categoria" class="form-label">Categoría del Juego</label>
                    <select id="categoria" name="categoria" required class="form-control">
                        <option value="" disabled th:selected="${juego.categoria == null}">Seleccione categoría</option>
                        <option value="Accion" th:selected="${juego.categoria == 'Accion'}">Acción</option>
                        <option value="Aventura" th:selected="${juego.categoria == 'Aventura'}">Aventura</option>
                        <option value="Shooter" th:selected="${juego.categoria == 'Shooter'}">Shooter</option>
                        <option value="Deportes" th:selected="${juego.categoria == 'Deportes'}">Deportes</option>
                        <option value="Terror" th:selected="${juego.categoria == 'Terror'}">Terror</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="precio" class="form-label">Precio del Juego</label>
                    <input type="number" step="0.01" id="precio" name="precio" required class="form-control"
                           th:value="${juego.precio}">
                </div>

                <div class="form-group">
                    <label for="descripcion" class="form-label">Descripción Breve</label>
                    <textarea id="descripcion" name="descripcion" rows="4" required class="form-control"
                              style="resize: vertical;"
                              th:text="${juego.descripcion}"></textarea>
                </div>

                <div class="form-group upload-box">
                    <label for="portada" class="form-label upload-label">
                        📸 Subir Portada
                    </label>

                    <input type="file" id="portada" name="portada" accept="image/*" class="form-control">

                    <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 10px; margin-bottom: 0;">
                        Si estás editando y no seleccionas una imagen nueva, se conserva la portada actual.
                    </p>
                </div>

                <div style="display: flex; gap: 12px; margin-top: 20px;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">
                        Guardar
                    </button>

                    <a href="/mis-juegos" class="btn btn-secondary" style="flex: 1; text-align: center;">
                        Cancelar
                    </a>
                </div>

            </form>
        </div>
    </main>
</th:block>
